[buildPlans.DevMono]
family = "Dev Mono"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
noLigation = true

  [buildPlans.DevMono.variants]
  inherits = "ss08"

    [buildPlans.DevMono.variants.design]
    six = "open-contour"
    nine = "open-contour"
    zero = "oval-reverse-slashed-split"
    capital-i = "serifed"
    capital-j = "serifed"
    f = "flat-hook-serifless"
    g = "single-storey-serifless"
    capital-eszet = "rounded-serifless"
    lower-delta = "rounded"
    lower-theta = "oval"
    partial-derivative = "curly-bar"
    asterisk = "penta-mid"
    paren = "normal"
    brace = "curly-flat-boundary"

    [buildPlans.DevMono.variants.italic]
    six = "open-contour"
    nine = "open-contour"
    zero = "oval-reverse-slashed-split"
    capital-i = "serifed"
